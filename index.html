<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN PAGE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="img">
            <img src="./Washing_machine.png" alt="Washing machine">
        </div>
        <div class="form">
            <form action="login.php" method="POST">
                <div class="text-container">
                    <h1>Hello Again!</h1> 
                    <p>Welcome back! We Miss You!</p>
                </div>
                <br><br>
                <div class="input-container">
                    <label for="username" class="label">Email</label><br>
                    <input type="text" id="username" class="form-control" name="username" placeholder="ABC@gmail.com" required>

                    <br><br>
                    <label for="password">Password</label><br>
                    <input type="password" id="password"class="form-control" name="password" placeholder="Password" required>
                    <p class="forget">Forget Password?</p>

                    <br><br>
                    <button type="submit">Login</button>

                    <br><br>
                    <div class="end-text">
                        <p>Don't have an account? <a href="register.html">Register</a></p>
                    </div>
                </div>  
            </form>
        </div>
    </div>
</body>
</html>
